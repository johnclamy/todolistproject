<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js"></script>
    <title>Todo App</title>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 pt-4 pb-8 max-w-2xl" x-data>
        <!-- Using store-based approach (recommended) -->
        <div x-data>

            <!-- Page header -->
            <header class="bg-white rounded-lg shadow-lg p-6">
                <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">
                    Todo App
                    <span
                        x-show="$store.todoStore.isLoading"
                        class="text-sm font-normal text-gray-500"
                    >
                        <i class="fas fa-spinner fa-spin ml-2"></i>
                    </span>
                </h1>
            </header>

            <main>
                <!-- Error alert message -->
                <div
                    x-show="$store.todoStore.error"
                    class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded my-4"
                    role="alert"
                >
                    <p x-text="$store.todoStore.error"></p>
                </div>

                <!-- Add todo form -->
                <section class="bg-white rounded-2xl shadow-xl p-6 mt-4 mb-8 border-b border-gray-200">
                    <form class="flex flex-col sm:flex-row gap-3 items-center">
                        <input
                            type="text"
                            placeholder="What do you need to do?"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            required
                        >
                        <button
                            type="submit"
                            class="w-full sm:w-auto px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors duration-300 cursor-pointer"
                        >
                            Add
                        </button>
                    </form>
                </section>

                <!-- Filter Tabs -->
                <div class="flex gap-2 mb-6 border-b">
                    <button class="px-4 py-2 border-b-2 border-transparent hover:border-gray-300 transition">
                        All
                    </button>
                    <button class="px-4 py-2 border-b-2 border-transparent hover:border-gray-300 transition">
                        Active
                    </button>
                    <button class="px-4 py-2 border-b-2 border-transparent hover:border-gray-300 transition">
                        Completed
                    </button>
                </div>

                <!-- Loading State -->
                <div
                    x-show="$store.todoStore.loading && $store.todoStore.todos.length === 0"
                    class="text-center py-8 text-gray-500"
                >
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">Loading todos...</p>
                </div>

                <!-- Todo list -->
                <article
                    x-show="!$store.todoStore.loading && $store.todoStore.todos.length > 0"
                    class="bg-white rounded-lg shadow-lg p-6 mb-4"
                >                    
                    <ul class="divide-y divide-gray-200">
                        <template x-for="todo in $store.todoStore.todos" :key="todo.id">
                            <li class="flex items-center justify-between py-3">
                                <div class="flex items-center gap-3">
                                    <input
                                        type="checkbox"
                                        class="form-checkbox h-5 w-5 text-blue-600"
                                        :checked="todo.isCompleted"
                                        
                                    >
                                    <span
                                        class="text-gray-800"
                                        :class="{'line-through text-gray-500': todo.isCompleted}"
                                        x-text="todo.task"
                                    ></span>
                
                                </div>
                                <button
                                    class="text-red-500 hover:text-red-700 transition"
                                >
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </li>
                        </template>
                    </ul>               
                </article>

                <!-- Empty State -->
                <div 
                    x-show="$store.todoStore.todos.length === 0" 
                    class="text-center py-8 text-gray-500"
                >
                    <i class="fas fa-check-circle text-4xl mb-2"></i>
                    <p>No todos found</p>
                </div>
            </main>
            
            <!-- Footer -->
            <footer class="mt-6 pt-4 border-t flex justify-between items-center text-sm text-gray-600">
                <!-- <span x-text="$store.todoStore.activeCount + ' items left'"></span> -->
                <button class="text-red-500 hover:text-red-700 transition">
                    Clear completed
                </button>
            </footer>
        </div> <!-- End of Alpine store scope -->
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
