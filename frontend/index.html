<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js"></script>
    <title>Todo App</title>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 pt-4 pb-8 max-w-2xl">
        <!-- Using store-based approach (recommended) -->
        <div x-data x-init="$store.todoStore.fetchTodos()">

            <!-- Page header -->
            <header class="bg-linear-to-r from-blue-600 to-purple-600 px-6 py-8">
                <h1 class="text-3xl font-bold text-white text-center">📝 Todo List</h1>
                <p class="text-blue-100 text-center mt-2">FastAPI + Alpine.js</p>
            </header>

            <main>
                <!-- Error alert message -->
                <div
                    x-show="$store.todoStore.error"
                    class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded my-4"
                    role="alert"
                >
                    <p x-text="$store.todoStore.error"></p>
                </div>

                <!-- Stats -->
                <section class="mt-4 px-6 py-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                    <div class="flex gap-4 text-sm">
                        <span class="text-gray-600">Total: <span class="font-semibold" x-text="$store.todoStore.todos.length"></span></span>
                        <span class="text-green-600">Completed: <span class="font-semibold" x-text="$store.todoStore.completedCount"></span></span>
                        <span class="text-yellow-600">Pending: <span class="font-semibold" x-text="$store.todoStore.activeCount"></span></span>
                    </div>
                    <button @click="$store.todoStore.deleteAll()" 
                            x-show="$store.todoStore.todos.length > 0"
                            class="text-sm text-red-600 hover:text-red-800 transition-colors duration-200 cursor-pointer">
                        Delete All
                    </button>
                </section>

                <!-- Add todo form -->
                <section class="bg-white rounded-0 shadow-xl p-6 mt-4 mb-8 border-b border-gray-200">
                    <form
                        @submit.prevent="$store.todoStore.addTodo($refs.newTodo.value)"
                        class="flex flex-col sm:flex-row gap-3 items-center"
                    >
                        <input
                            type="text"
                            placeholder="What do you need to do?"
                            x-ref="newTodo"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            required
                        >
                        <button
                            type="submit"
                            class="w-full sm:w-auto px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors duration-300 cursor-pointer"
                        >
                            Add
                        </button>
                    </form>
                </section>

                <!-- Loading State -->
                <div
                    x-show="$store.todoStore.loading && $store.todoStore.todos.length === 0"
                    class="text-center py-8 text-gray-500"
                >
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">Loading todos...</p>
                </div>

                <!-- Todo list -->
                <article
                    x-show="!$store.todoStore.loading && $store.todoStore.filteredTodos.length > 0"
                    class="bg-white rounded-lg shadow-lg p-6"
                >                   
                    <ul class="divide-y divide-gray-200">
                        <template x-for="todo in $store.todoStore.filteredTodos" :key="todo.id">
                            <li class="flex items-center justify-between py-3">
                                <div class="flex items-center gap-3 mb-2">
                                    <input
                                        type="checkbox"                                        
                                        :checked="todo.isCompleted"
                                        @change="$store.todoStore.toggleTodo(todo)"
                                        class="form-checkbox h-5 w-5 text-blue-600"                                        
                                    >
                                    <span
                                        x-text="todo.task"
                                        :class="{'line-through text-gray-500': todo.isCompleted}"
                                        class="text-gray-800"                                        
                                    ></span>                
                                </div>
                                <button
                                    @click="$store.todoStore.deleteTodo(todo.id)"
                                    class="text-red-500 hover:text-red-700 transition cursor-pointer"
                                >
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </li>
                        </template>
                    </ul>               
                </article>

                <!-- Empty State -->
                <div 
                    x-show="!$store.todoStore.loading && $store.todoStore.filteredTodos.length === 0" 
                    class="text-center py-8 text-gray-500"
                >
                    <i class="fas fa-check-circle text-4xl mb-2"></i>
                    <p>No todos found</p>
                </div>
            </main>
            
            <!-- Footer -->
            <footer
                x-show="$store.todoStore.filteredTodos.length > 0"
                class="mt-6 pt-4 border-t flex justify-between items-center text-sm text-gray-600"
            >
                <span x-text="$store.todoStore.activeCount + ' items left'"></span>
                <button
                    x-show="$store.todoStore.completedCount > 0"
                    @click="$store.todoStore.deleteCompleted()"
                    class="text-red-500 hover:text-red-700 transition cursor-pointer"
                >
                    Clear completed
                </button>
            </footer>
        </div> <!-- End of Alpine store scope -->
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
