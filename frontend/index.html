<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js"></script>
    <title>Todo App</title>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- Using store-based approach (recommended) -->
        <div>

            <!-- Page header -->
            <header class="bg-white rounded-lg shadow-lg p-6">
                <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">
                    Todo App
                    <span class="text-sm font-normal text-gray-500">
                        <i class="fas fa-spinner fa-spin ml-2"></i>
                    </span>
                </h1>
            </header>

            <main>
                <!-- Error alert message -->
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded my-4"></div>

                <!-- Add todo form -->
                <form class="mb-6">
                    <div class="flex gap-2">
                        <input type="text" placeholder="What needs to be done?"
                                class="flex-1 px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="submit" 
                                class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
                            Add
                        </button>
                    </div>
                </form>

                <!-- Filter Tabs -->
                <div class="flex gap-2 mb-6 border-b">
                    <button class="px-4 py-2 border-b-2 border-transparent hover:border-gray-300 transition">
                        All
                    </button>
                    <button class="px-4 py-2 border-b-2 border-transparent hover:border-gray-300 transition">
                        Active
                    </button>
                    <button class="px-4 py-2 border-b-2 border-transparent hover:border-gray-300 transition">
                        Completed
                    </button>
                </div>

                <!-- Loading State -->
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">Loading todos...</p>
                </div>

                <!-- Todo list goes here... -->

                <!-- Empty State -->
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-check-circle text-4xl mb-2"></i>
                    <p>No todos found</p>
                </div>
            </main>      
        </div> <!-- End of Alpine store scope -->
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
