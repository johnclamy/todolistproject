<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="./src/style.css">
    <title>Todo App</title>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-linear-to-br from-blue-50 to-purple-50 min-h-screen">
    <div
        class="container mx-auto px-4 py-8 max-w-3xl"
        x-data="todoApp()"
        x-init="init()"
        x-cloak
    >
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <header class="bg-linear-to-r from-blue-600 to-purple-600 px-6 py-8">
                <h1 class="text-3xl font-bold text-white text-center">📝 Todo App</h1>
                <p class="text-blue-100 text-center mt-2">Manage all your tasks in one place</p>
            </header>
        </div>

    </div>
</body>
</html>
