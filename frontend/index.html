<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="./src/style.css">
    <title>Todo App</title>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-linear-to-br from-blue-50 to-purple-50 min-h-screen">
    <div
        class="container mx-auto px-4 py-8 max-w-3xl"
        x-data="todoApp()"
        x-init="init()"
        x-cloak
    >
        <!-- App header and its wrapper -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <header class="bg-linear-to-r from-blue-600 to-purple-600 px-6 py-8">
                <h1 class="text-3xl font-bold text-white text-center">📝 Todo App</h1>
                <p class="text-blue-100 text-center mt-2">Manage all your tasks in one place</p>
            </header>
        </div>

        <!-- Main content area -->
        <main class="mt-8">

            <!-- Input form for adding new todos -->
            <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
                <form @submit.prevent="addTodo" class="flex flex-col sm:flex-row gap-3 items-center">
                    <input
                        type="text"
                        x-model="newTodo"
                        placeholder="What do you need to do?"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                    <button type="submit" class="w-full sm:w-auto px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors duration-300">Add</button>
                </form>
            </div>

        </main>
    </div>
</body>
</html>
